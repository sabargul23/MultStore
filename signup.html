<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - TradeHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link href="style.css" rel="stylesheet" type="text/css">
</head>

<body>

<section class="signup-page">

<div class="signup-box">

<h2>Create Account</h2>

<form>

<input type="text" class="form-control mb-3" placeholder="Full Name">

<input type="email" class="form-control mb-3" placeholder="Email Address">

<input type="password" class="form-control mb-3" placeholder="Password">

<input type="password" class="form-control mb-3" placeholder="Confirm Password">

<button class="btn btn-warning w-100">
Create Account
</button>

</form>

<p class="mt-3">
Already have an account?
<a href="#">Login</a>
</p>

</div>

</section>

</body>
</html>
